- name: Deploy to server
  run: |
    ssh -o StrictHostKeyChecking=no ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} << 'EOF'
      cd ${{ vars.SERVER_PATH }}

      git pull origin main

      pnpm install

      cd client
      pnpm install
      pnpm build
      cd ..

      pm2 reload todo-app

      echo "Deployment done"
    EOF
